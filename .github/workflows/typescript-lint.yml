name: TypeScript Lint

on:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/typescript-lint.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/typescript-lint.yml'

jobs:
  lint:
    name: next lint & tsc
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Next.js type stubs
        run: mkdir -p .next/dev/types && touch .next/dev/types/routes.d.ts

      - name: ESLint (next lint)
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit
